name: Fetch Books from Gutenberg

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    paths:
      - 'api/books.json' # Auto-runs if the JSON catalogue is updated manually

jobs:
  download-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the downloaded books back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests PyPDF2 beautifulsoup4

      - name: Run Book Downloader Script
        run: python download_books.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api/books.json books_content/
          git commit -m "Automated: Downloaded raw book texts from Gutenberg" || echo "No changes to commit"
          git push
